[package]
name = "axvirtio-blk"
version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
edition = "2021"

[features]
default = ["virtio-backend"]
file-backend = ["axfs","dep:axstd"]
nvme-backend = []
memory-backend = []
virtio-backend = []

[dependencies]
axvirtio-common = { workspace = true }
axaddrspace = { workspace = true }
axerrno = "0.1.0"
memory_addr = "0.3"
nvme-driver = "0.3.1"
spin = "0.9"
log = "0.4"
pcie = "0.2"
byte-unit = {version = "5.1.6", default-features = false, features = ["byte"]}
dma-api = {version = "0.3", features = ["alloc"]}
virtio-drivers = "0.7.4"

axdriver_pci = { git = "https://github.com/arceos-org/axdriver_crates.git", tag = "v0.1.2" }
axdevice_base = { git = "https://github.com/arceos-hypervisor/axdevice_crates.git" }
axhal = { git = "https://github.com/arceos-hypervisor/arceos.git", branch = "vmm" }
axfs = { git = "https://github.com/arceos-hypervisor/arceos.git", branch = "vmm", optional = true }
axstd = { git = "https://github.com/arceos-hypervisor/arceos.git", branch = "vmm", optional = true, features = [
    "fs",
] }
